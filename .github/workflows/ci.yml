name: Test, Build, Deploy

on:
  workflow_dispatch: 
  push:
    branches: ['**']
  pull_request:
    branches: ['main']

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Setup Node.js 24
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci --include=optional
      - name: Run tests with coverage
        run: npm run coverage
      - name: Coverage summary
        run: |
          echo "## Test Coverage" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          npm install -g istanbul-react-summary 2>/dev/null || true
          cat coverage/coverage-final.json | node -e "
            const fs = require('fs');
            const data = JSON.parse(fs.readFileSync('/dev/stdin', 'utf8'));
            let totals = { statements: 0, covered: 0, branches: 0, branchesCovered: 0, functions: 0, functionsCovered: 0, lines: 0, linesCovered: 0 };
            Object.values(data).forEach(file => {
              totals.statements += file.s.length;
              totals.covered += Object.values(file.s).filter(v => v > 0).length;
              totals.branches += Object.keys(file.b).length;
              totals.branchesCovered += Object.values(file.b).flat().filter(v => v > 0).length;
              totals.functions += Object.keys(file.f).length;
              totals.functionsCovered += Object.values(file.f).filter(v => v > 0).length;
              totals.lines += Object.keys(file.s).length;
              totals.linesCovered += Object.values(file.s).filter(v => v > 0).length;
            });
            console.log('| Metric | % |');
            console.log('|--------|--|');
            console.log('| Statements | ' + Math.floor(totals.covered / totals.statements * 100) + '% |');
            console.log('| Branches | ' + Math.floor(totals.branchesCovered / totals.branches * 100) + '% |');
            console.log('| Functions | ' + Math.floor(totals.functionsCovered / totals.functions * 100) + '% |');
            console.log('| Lines | ' + Math.floor(totals.linesCovered / totals.lines * 100) + '% |');
          " >> $GITHUB_STEP_SUMMARY
      - name: Upload coverage reports
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: coverage
          retention-days: 30
      - name: Upload npm logs on failure
        uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: npm-logs-test
          path: /home/runner/.npm/_logs/
          retention-days: 5

  build-and-deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' || (github.event_name == 'workflow_dispatch' && startsWith(github.ref, 'refs/tags/'))
    permissions:
      contents: write
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Install GitVersion
        uses: gittools/actions/gitversion/setup@v4.5.0
        with:
          versionSpec: '6.7.x'
      - name: Determine Version
        id: gitversion # step id used as reference for output values
        uses: gittools/actions/gitversion/execute@v4.5.0
      - name: Output Version to Summary
        run: |
          echo "Semantic version: ${{ steps.gitversion.outputs.fullSemVer }}" >> $GITHUB_STEP_SUMMARY
      - name: Setup Node.js 24
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci --include=optional
      - name: Update package.json version
        run: |
          npm pkg set version=${{ steps.gitversion.outputs.fullSemVer }}
      - name: Build project
        run: npm run build
      - name: Upload npm logs on failure
        uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: npm-logs-build
          path: /home/runner/.npm/_logs/
          retention-days: 5
      - name: Configure GitHub Pages
        uses: actions/configure-pages@v6
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: build
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
